<ion-header>
  <ion-toolbar>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card class="content-card chat-card">
    <ion-card-content>
      <ion-list>
        <ion-item *ngFor="let message of messages">
          {{ message }}
        </ion-item>
      </ion-list>

      <ion-item>
        <ion-textarea [(ngModel)]="messageInput" placeholder="Type your message"></ion-textarea>
        <ion-button (click)="sendMessage()">Send</ion-button>
      </ion-item>

      <app-profile-card [profile]="profile" class="content-card profile-card"></app-profile-card>

    </ion-card-content>

  </ion-card>

</ion-content>
